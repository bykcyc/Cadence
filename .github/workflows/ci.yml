name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  check:
    name: Typecheck & test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  release:
    name: Build & release
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # electron-builder rebuilds the native uiohook-napi module with node-gyp, which needs
      # distutils — removed from Python 3.12 (the runner default). Pin 3.11 so the rebuild works.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: npm ci
      - name: Build Windows installer + portable
        # `--publish never` stops electron-builder from auto-publishing to a GitHub Release on a
        # tag build (its default when a token is present); the softprops step below is the single
        # uploader. No GH_TOKEN here on purpose — building needs no token.
        run: npm run build:win -- --publish never
      - name: Publish release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: Cadence ${{ github.ref_name }}
          body: |
            **Cadence** — a private, local-first meeting recorder, transcriber & voice toolkit for Windows.

            ### Downloads
            - **Cadence-Setup-x.y.z.exe** — installer (recommended)
            - **Cadence-x.y.z-portable.exe** — no-install single executable

            ### First run
            On the first transcription, Cadence sets up its local engine automatically (installs `uv`,
            a Python environment, and the speech model). The default is the lightweight **CPU** engine
            (no PyTorch, ~1 GB). Switch to **GPU** in *Settings → Recording* for much faster
            transcription of long meetings — it then pulls PyTorch (CUDA) + the full ML stack (~2–4 GB)
            and needs an NVIDIA GPU. For AI notes / dictation polish & translate you add your own API
            key; speaker diarization needs a free Hugging Face token (and uses the GPU engine).

            > The build is **unsigned**, so Windows SmartScreen may warn on first launch →
            > **More info → Run anyway**.
          files: |
            dist/Cadence-Setup-*.exe
            dist/Cadence-*-portable.exe
