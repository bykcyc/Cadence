name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  check:
    name: Typecheck & test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  release:
    name: Build & release
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build Windows installer + portable
        # `--publish never` stops electron-builder from auto-publishing to a GitHub Release on a
        # tag build (its default when a token is present); the softprops step below is the single
        # uploader. No GH_TOKEN here on purpose — building needs no token.
        run: npm run build:win -- --publish never
      - name: Attach artifacts to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Cadence-Setup-*.exe
            dist/Cadence-*-portable.exe
